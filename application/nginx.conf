events {}

http {
   client_body_timeout 10s;
   client_header_timeout 10s;
   keepalive_timeout 20s;
   send_timeout 15s;
   large_client_header_buffers 2 4k;
   client_max_body_size 2M;

   gzip on;
   gzip_vary on;
   gzip_static on;
   gzip_proxied any;
   gzip_comp_level 5;
   gzip_min_length 1024;
   gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
   proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=dynamic_cache:10m inactive=60m max_size=1g;

   map $request_method $known_method {
      default 0;
      GET 1;
      HEAD 1;
      POST 1;
      OPTIONS 1;
      PUT 1;
      PATCH 1;
      DELETE 1;
   }

   map $request_method $site_method {
      default 0;
      GET 1;
      HEAD 1;
      POST 1;
      OPTIONS 1;
   }

   map $request_method $read_method {
      default 0;
      GET 1;
      HEAD 1;
      OPTIONS 1;
   }

   map $request_method $api_method {
      default 0;
      GET 1;
      HEAD 1;
      POST 1;
      OPTIONS 1;
      PUT 1;
      PATCH 1;
      DELETE 1;
   }

   map $request_method $post_method {
      default 0;
      POST 1;
      OPTIONS 1;
   }

   map $request_uri $oversized_uri {
      default 0;
      "~^.{2049,}$" 1;
   }

   map $http_upgrade $connection_upgrade {
      default upgrade;
      '' close;
   }

   server {
      listen 443 ssl;
      server_name shadowself.io www.shadowself.io;

      listen 80;
      server_name shadowself.io www.shadowself.io;

      ssl_certificate /etc/letsencrypt/live/shadowself.io/fullchain.pem;
      ssl_certificate_key /etc/letsencrypt/live/shadowself.io/privkey.pem;
      ssl_protocols TLSv1.3 TLSv1.2;
      ssl_prefer_server_ciphers off;

      if ($known_method = 0) {
         return 405;
      }

      if ($oversized_uri = 1) {
         return 414;
      }

      location /.well-known/acme-challenge/ {
         if ($read_method = 0) {
            return 405;
         }

         root /var/www/certbot;
      }

      location / {
         if ($site_method = 0) {
            return 405;
         }

         proxy_pass http://localhost:5000;
         proxy_redirect off;

         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Host $host;
         proxy_set_header X-Forwarded-Proto $scheme;
      }

      location ~ ^/(ws-(creation-process|api)|billing/crypto/track-invoice/) {
         if ($read_method = 0) {
            return 405;
         }

         client_max_body_size 1M;

         proxy_pass http://localhost:3000;
         proxy_redirect off;

         proxy_http_version 1.1;
         proxy_read_timeout 300s;
         proxy_set_header Connection $connection_upgrade;
         proxy_set_header Upgrade $http_upgrade;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Host $host;
         proxy_set_header X-Forwarded-Proto $scheme;
      }

      location ~ ^/api {
         if ($api_method = 0) {
            return 405;
         }

         client_max_body_size 20M;

         proxy_pass http://localhost:3000;
         proxy_redirect off;

         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Host $host;
         proxy_set_header X-Forwarded-Proto $scheme;
      }

      location ~ ^/webhook-(twilio|stripe) {
         if ($post_method = 0) {
            return 405;
         }

         client_max_body_size 1M;

         proxy_pass http://localhost:3000;
         proxy_redirect off;

         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Host $host;
         proxy_set_header X-Forwarded-Proto $scheme;
      }
   }

   server {
      listen 8080;
      server_name ~\.onion$;

      if ($known_method = 0) {
         return 405;
      }

      if ($oversized_uri = 1) {
         return 414;
      }

      location / {
         if ($site_method = 0) {
            return 405;
         }

         proxy_pass http://localhost:5000;
         proxy_redirect off;

         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Host $host;
         proxy_set_header X-Forwarded-Proto $scheme;
      }

      location ~ ^/(ws-(creation-process|api)|billing/crypto/track-invoice/) {
         if ($read_method = 0) {
            return 405;
         }

         client_max_body_size 1M;

         proxy_pass http://localhost:3000;
         proxy_redirect off;

         proxy_http_version 1.1;
         proxy_read_timeout 300s;
         proxy_set_header Connection $connection_upgrade;
         proxy_set_header Upgrade $http_upgrade;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Host $host;
         proxy_set_header X-Forwarded-Proto $scheme;
      }

      location ~ ^/api {
         if ($api_method = 0) {
            return 405;
         }

         client_max_body_size 20M;

         proxy_pass http://localhost:3000;
         proxy_redirect off;

         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Host $host;
         proxy_set_header X-Forwarded-Proto $scheme;
      }
   }
}
